<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSV Diff</title>
  </head>

  <body class="bg-gray-50 text-gray-800">
    <main class="max-w-6xl mx-auto px-6 py-8">
      <!-- Header -->
      <header class="mb-8 flex items-baseline gap-x-4">
        <h1 class="text-3xl font-semibold tracking-tight">
          CSV Comparator Tool
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Compare multiple CSV files. Your files are not uploaded anywhere. All
          processing happens locally in your browser.
        </p>
      </header>

      <!-- File Selection -->
      <section class="bg-white border p-5 mb-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-medium text-gray-700">Files</h2>

          <button
            id="add-files-btn"
            class="px-4 py-2 text-sm font-medium border bg-gray-100 hover:bg-gray-200"
          >
            Add file(s)
          </button>

          <input
            type="file"
            id="file-input"
            accept=".csv"
            multiple
            class="hidden"
          />
        </div>

        <!-- Selected files list -->
        <ul id="file-list" class="divide-y text-sm"></ul>
      </section>

      <!-- Compare Action and Status -->
      <div class="mb-6 flex items-center gap-4 flex-wrap">
        <button
          id="compareBtn"
          class="px-5 py-2 bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 rounded transition-colors"
        >
          Start comparison
        </button>
        <div class="flex items-center gap-2 text-sm text-gray-600 font-medium">
          <span
            id="status-dot"
            class="w-2.5 h-2.5 rounded-full bg-gray-300 transition-all duration-300"
          ></span>
          <span id="status" class="whitespace-pre-wrap">Worker ready.</span>
        </div>
        <button
          id="clearBtn"
          class="px-4 py-2 border border-gray-300 text-gray-700 text-sm font-medium hover:bg-gray-50 hover:text-gray-900 disabled:opacity-50 disabled:cursor-not-allowed rounded transition-colors ml-auto cursor-pointer"
        >
          Clear results
        </button>
      </div>

      <!-- Legend -->
      <div id="diff-legend" class="mb-4 flex flex-wrap gap-3 rounded"></div>

      <!-- Virtual Grid -->
      <div
        id="diff-grid-container"
        class="border bg-white flex flex-col relative w-full shadow-inner text-sm"
      >
        <!-- Header Viewport (Hidden scrollbar but synchronized horizontally) -->
        <div
          id="diff-header-viewport"
          class="overflow-hidden w-full bg-gray-100 border-b shadow-[0_1px_0_rgba(0,0,0,1)] sticky top-0 z-40 shrink-0 select-none"
        >
          <div id="diff-header-content" class="relative min-w-full"></div>
        </div>
        <!-- Body Viewport -->
        <div
          id="diff-body-viewport"
          class="overflow-auto w-full relative flex-1 bg-white z-0"
        >
          <div id="diff-body-content" class="relative min-w-full"></div>
        </div>
      </div>

      <!-- Pagination -->
      <div
        id="pagination"
        class="sticky bottom-0 bg-gray-50 border-t py-3 -mt-0.5 shadow-sm"
      >
        <div
          class="max-w-6xl mx-auto px-6 flex items-center justify-between flex-wrap gap-4"
        >
          <div class="flex items-center gap-2">
            <button
              id="first-btn"
              class="p-2 border rounded bg-white hover:bg-gray-50 disabled:opacity-40 disabled:hover:bg-white disabled:cursor-not-allowed transition-colors flex items-center justify-center text-gray-700"
              aria-label="First page"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5"
                />
              </svg>
            </button>
            <button
              id="prev-btn"
              class="p-2 border rounded bg-white hover:bg-gray-50 disabled:opacity-40 disabled:hover:bg-white disabled:cursor-not-allowed transition-colors flex items-center justify-center text-gray-700"
              aria-label="Previous page"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 19.5L8.25 12l7.5-7.5"
                />
              </svg>
            </button>

            <div
              class="flex items-center gap-1.5 text-sm text-gray-600 font-medium px-2"
            >
              <span>Page</span>
              <input
                id="page-input"
                type="number"
                min="1"
                class="w-14 px-1.5 py-0.5 border rounded text-center bg-white focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                value="1"
              />
              <span>of</span>
              <span id="total-pages" class="font-mono">1</span>
            </div>

            <button
              id="next-btn"
              class="p-2 border rounded bg-white hover:bg-gray-50 disabled:opacity-40 disabled:hover:bg-white disabled:cursor-not-allowed transition-colors flex items-center justify-center text-gray-700"
              aria-label="Next page"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8.25 4.5l7.5 7.5-7.5 7.5"
                />
              </svg>
            </button>
            <button
              id="last-btn"
              class="p-2 border rounded bg-white hover:bg-gray-50 disabled:opacity-40 disabled:hover:bg-white disabled:cursor-not-allowed transition-colors flex items-center justify-center text-gray-700"
              aria-label="Last page"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5"
                />
              </svg>
            </button>

            <div
              class="flex items-center gap-1.5 text-sm text-gray-600 font-medium border-l pl-4 ml-2"
            >
              <span>Rows per page:</span>
              <select
                id="page-size-select"
                class="px-1.5 py-0.5 border rounded bg-white focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm font-medium cursor-pointer"
              >
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
              </select>
            </div>
          </div>

          <div id="row-info" class="text-sm text-gray-500 font-medium"></div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>

    <!-- Custom Tooltip -->
    <div
      id="custom-tooltip"
      class="fixed z-50 opacity-0 pointer-events-none transition-opacity duration-150 bg-white border border-gray-200 text-gray-800 text-xs rounded-md shadow-xl p-3 max-w-md break-words flex flex-col pointer-events-none"
      style="top: 0; left: 0"
    ></div>
  </body>
</html>
