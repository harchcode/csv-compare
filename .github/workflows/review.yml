name: PR Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-haiku:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'review pls') &&
      github.event.comment.user.login == 'harchcode'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CONFIG__MODEL: claude-3-haiku-20240307
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: 8000

  review-sonnet:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'pro review pls') &&
      github.event.comment.user.login == 'harchcode'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CONFIG__MODEL: claude-3-5-sonnet
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: 16000
